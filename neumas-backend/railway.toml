[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerBuildTarget = "api"

[deploy]
# healthcheckPath is set per-service via Railway service instance settings.
# API service: /health (configured in Railway dashboard)
# Worker service: no healthcheck (Celery workers don't expose HTTP)
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
