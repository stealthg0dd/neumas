# Force Nixpacks to treat this monorepo root as a Python project.
# Without this, Nixpacks can't detect Python because pyproject.toml
# lives in neumas-backend/ rather than the repo root.

providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc", "postgresql"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip setuptools wheel",
  "python -m pip install ./neumas-backend",
]

[start]
cmd = "bash start.sh"
